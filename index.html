<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Component harness (prototype)</title>
		<style>
			* { box-sizing: border-box; }
			body {
				margin: 0;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				color: #172b4d;
				background: #fff;
			}
			.harness { display: flex; min-height: 100vh; }
			.stage {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 24px;
				background: #f4f5f7;
			}
			.controls {
				width: 260px;
				border-left: 1px solid #dfe1e6;
				padding: 14px 16px;
				font-size: 13px;
				background: #fff;
			}
			.controls h3 { margin: 0 0 2px; font-size: 13px; }
			.controls .muted { color: #6b778c; font-size: 11px; margin: 0 0 12px; }
			.controls .field { margin: 0 0 10px; }
			.controls label { display: block; margin: 0 0 3px; font-weight: 600; font-size: 11px; color: #5e6c84; text-transform: uppercase; letter-spacing: .03em; }
			.controls input[type=text] {
				width: 100%; padding: 6px 8px; border: 1px solid #dfe1e6; border-radius: 4px; font: inherit;
			}
			.controls .check { display: flex; align-items: center; gap: 6px; font-weight: 600; }
			.controls .hint { color: #6b778c; font-size: 11px; margin-top: 12px; border-top: 1px solid #ebecf0; padding-top: 10px; }
			/* Mock EntitySwitcher */
			.es {
				width: 320px; background: #fff; border: 1px solid #dfe1e6; border-radius: 8px;
				box-shadow: 0 1px 4px rgba(9,30,66,.13); overflow: hidden;
			}
			.es-button {
				width: 100%; text-align: left; padding: 12px 14px; border: none; background: #fff;
				cursor: pointer; font: inherit; display: flex; justify-content: space-between; align-items: center;
			}
			.es-button:hover { background: #f4f5f7; }
			.es-current { font-weight: 600; }
			.es-sub { color: #6b778c; font-size: 12px; }
			.es-menu { border-top: 1px solid #dfe1e6; }
			.es-opt { padding: 10px 14px; cursor: pointer; }
			.es-opt:hover { background: #deebff; }
			.es-banner { padding: 10px 14px; background: #fffae6; color: #974f0c; font-size: 12px; }
			/* Mock StoreDashboard */
			.dash { width: 360px; background: #fff; border: 1px solid #dfe1e6; border-radius: 8px; padding: 16px; }
			.dash h2 { margin: 0 0 2px; font-size: 16px; }
			.dash .ts { color: #6b778c; font-size: 12px; margin: 0 0 12px; }
			.dash .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
			.dash .tile { background: #f4f5f7; border-radius: 6px; padding: 12px; }
			.dash .tile b { display: block; font-size: 18px; }
		</style>
	</head>
	<body>
		<div class="harness">
			<div class="stage" id="stage"></div>
			<div class="controls" id="controls"></div>
		</div>
		<script>
			// Throwaway Storybook-style harness: addressable by ?story=<id>, renders an
			// interactive mock component plus a Controls panel that edits the
			// component's props/args (the same "edit" model Storybook uses). Every edit
			// re-renders the component live AND is posted up to the embedding parent
			// (the Test Scenarios Components tab) so the change can become a requested
			// edit in a PR. Mirrors Storybook's iframe.html?id= contract.
			const params = new URLSearchParams(location.search);
			const storyId = params.get('story') || params.get('id') || 'entity-switcher';
			const stage = document.getElementById('stage');
			const controls = document.getElementById('controls');

			const emit = (change) => {
				try {
					parent.postMessage({ source: 'cs-component-harness', story: storyId, ...change }, '*');
				} catch {}
			};

			// --- Stories: each has editable `args` + a render(args) function ---

			const stories = {
				'entity-switcher': {
					title: 'EntitySwitcher',
					args: {
						store: 'Smoke Store A',
						company: 'Smoke Company A',
						brand: 'Smoke Brand A',
						switching: false,
					},
					controls: [
						{ key: 'store', label: 'Store', type: 'text' },
						{ key: 'company', label: 'Company', type: 'text' },
						{ key: 'brand', label: 'Brand', type: 'text' },
						{ key: 'switching', label: 'Show "Switching context…" banner', type: 'boolean' },
					],
					hint: 'Edit the props on the right — the component updates live and the change is reported to the Test Scenarios app. Or open the dropdown to interact.',
					render(args) {
						let open = false;
						const root = document.createElement('div');
						root.className = 'es';
						const draw = () => {
							root.innerHTML = '';
							const btn = document.createElement('button');
							btn.className = 'es-button';
							btn.innerHTML =
								'<span><span class="es-current">' + args.store + '</span><br>' +
								'<span class="es-sub">' + args.company + ' · ' + args.brand + '</span></span><span>▾</span>';
							btn.onclick = () => { open = !open; draw(); };
							root.appendChild(btn);
							if (args.switching) {
								const b = document.createElement('div');
								b.className = 'es-banner';
								b.textContent = 'Switching context…';
								root.appendChild(b);
							} else if (open) {
								const menu = document.createElement('div');
								menu.className = 'es-menu';
								['Smoke Store B — Smoke Company B', 'Acme Central — Acme Foods'].forEach((label) => {
									const o = document.createElement('div');
									o.className = 'es-opt';
									o.textContent = label;
									o.onclick = () => { open = false; draw(); emit({ event: 'switch-entity', to: label }); };
									menu.appendChild(o);
								});
								root.appendChild(menu);
							}
						};
						draw();
						return root;
					},
				},
				'store-dashboard': {
					title: 'StoreDashboard',
					args: { heading: 'Store dashboard', sales: 'R 4,210', transactions: '128' },
					controls: [
						{ key: 'heading', label: 'Heading', type: 'text' },
						{ key: 'sales', label: 'Sales today', type: 'text' },
						{ key: 'transactions', label: 'Transactions', type: 'text' },
					],
					hint: 'Edit the props on the right — the component updates live and the change is reported to the Test Scenarios app.',
					render(args) {
						const root = document.createElement('div');
						root.className = 'dash';
						root.innerHTML =
							'<h2>' + args.heading + '</h2><p class="ts">Last updated just now</p>' +
							'<div class="tiles">' +
							'<div class="tile">Sales today<b>' + args.sales + '</b></div>' +
							'<div class="tile">Transactions<b>' + args.transactions + '</b></div>' +
							'<div class="tile">Avg basket<b>R 32.90</b></div>' +
							'<div class="tile">Open tills<b>3</b></div></div>';
						return root;
					},
				},
			};

			const story = stories[storyId] || stories['entity-switcher'];
			const args = { ...story.args };

			const renderStage = () => {
				stage.innerHTML = '';
				const root = document.createElement('div');
				root.id = 'cs-component-root';
				root.appendChild(story.render(args));
				stage.appendChild(root);
			};

			// Live style overrides pushed down from the host (the Test Scenarios
			// Components panel). The host authors CSS; we inject it so the real
			// component restyles in place. The override CSS is what the host captures
			// as the requested styling change.
			let overrideEl = null;
			window.addEventListener('message', (e) => {
				const d = e.data;
				if (!d || d.source !== 'cs-host') return;
				if (d.type === 'apply-style') {
					if (!overrideEl) {
						overrideEl = document.createElement('style');
						overrideEl.id = 'cs-override';
						document.head.appendChild(overrideEl);
					}
					overrideEl.textContent = d.css || '';
				}
			});

			const renderControls = () => {
				controls.innerHTML = '';
				const h = document.createElement('h3');
				h.textContent = story.title;
				controls.appendChild(h);
				const sub = document.createElement('p');
				sub.className = 'muted';
				sub.textContent = 'Controls (prototype)';
				controls.appendChild(sub);

				story.controls.forEach((c) => {
					const field = document.createElement('div');
					field.className = 'field';
					if (c.type === 'boolean') {
						const lab = document.createElement('label');
						lab.className = 'check';
						const cb = document.createElement('input');
						cb.type = 'checkbox';
						cb.checked = Boolean(args[c.key]);
						cb.onchange = () => {
							args[c.key] = cb.checked;
							renderStage();
							emit({ event: 'prop-change', prop: c.key, value: cb.checked });
						};
						lab.appendChild(cb);
						lab.appendChild(document.createTextNode(' ' + c.label));
						field.appendChild(lab);
					} else {
						const lab = document.createElement('label');
						lab.textContent = c.label;
						const input = document.createElement('input');
						input.type = 'text';
						input.value = args[c.key];
						input.oninput = () => {
							args[c.key] = input.value;
							renderStage();
							emit({ event: 'prop-change', prop: c.key, value: input.value });
						};
						field.appendChild(lab);
						field.appendChild(input);
					}
					controls.appendChild(field);
				});

				const hint = document.createElement('div');
				hint.className = 'hint';
				hint.textContent = story.hint;
				controls.appendChild(hint);
			};

			renderStage();
			renderControls();
			// Tell the host we're ready so it can (re)send any active style override.
			emit({ event: 'ready' });
			emit({ event: 'mounted' });
		</script>
	</body>
</html>
